<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flower HMS">
<title>Flower HMS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --hdr:#252318;--gold:#C9A227;--gold2:#a07d10;
  --cream:#F4F1EB;--white:#fff;--border:#ddd;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;
  --orange:#f97316;--amber:#d97706;--gray:#9ca3af;
  --tbl-hdr:#2c2a1e;
  --row-occ:#f0fbf4;--row-dep:#fff8f0;--row-arr:#f0f7ff;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
          background:var(--cream);color:#1a1a1a;font-size:13px;}

/* ── LOGIN ──────────────────────────────────────────────────── */
#s-login{display:flex;flex-direction:column;align-items:center;justify-content:center;
         min-height:100vh;background:var(--hdr);padding:20px;}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.brand-name{font-size:26px;font-weight:800;color:#f0ead0;letter-spacing:1px;}
.login-sub{color:#9a9070;font-size:13px;margin-bottom:40px;text-align:center;}
.role-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.role-card{background:#302d20;border:1px solid #4a4530;border-radius:14px;
           padding:30px 38px;text-align:center;cursor:pointer;
           transition:background .2s,transform .1s;min-width:180px;}
.role-card:hover{background:#3e3a28;}
.role-card:active{transform:scale(.97);}
.rc-icon{font-size:36px;margin-bottom:10px;}
.rc-title{color:#f0ead0;font-size:16px;font-weight:700;margin-bottom:4px;}
.rc-sub{color:#9a9070;font-size:11px;}
#fo-form{margin-top:28px;display:none;flex-direction:column;align-items:center;gap:10px;}
.l-input{background:#302d20;border:1px solid #4a4530;border-radius:8px;
         padding:11px 16px;color:#f0ead0;font-size:14px;width:250px;outline:none;}
.l-input:focus{border-color:var(--gold);}
.l-input::placeholder{color:#6a6550;}
.l-btn{background:var(--gold);color:#1a1500;font-weight:700;border:none;
       border-radius:8px;padding:11px 32px;cursor:pointer;font-size:14px;width:250px;}
.l-btn:hover{background:var(--gold2);color:#fff;}
#l-err{color:#ef4444;font-size:12px;min-height:16px;}

/* ── HEADER ─────────────────────────────────────────────────── */
.hdr{background:var(--hdr);padding:0 16px;display:flex;align-items:center;
     gap:8px;height:48px;position:sticky;top:0;z-index:200;flex-shrink:0;}
.hdr-logo{font-size:15px;font-weight:700;color:#f0ead0;display:flex;align-items:center;gap:6px;flex:1;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.hdr-right{display:flex;align-items:center;gap:6px;}
.hdr-pill{background:#3a3620;color:#d4b84a;border:1px solid #5a5030;border-radius:20px;
          padding:4px 11px;font-size:11px;font-weight:600;white-space:nowrap;}
.hdr-out{background:transparent;color:#9a9070;border:1px solid #4a4530;border-radius:20px;
         padding:4px 11px;font-size:11px;cursor:pointer;}
.hdr-out:hover{color:#f0ead0;}

/* ── BUILDING TABS ───────────────────────────────────────────── */
.bld-tabs{background:var(--white);border-bottom:1px solid var(--border);
          display:flex;padding:0 14px;overflow-x:auto;}
.bld-tab{padding:11px 16px;font-size:12px;font-weight:600;cursor:pointer;
         border-bottom:2px solid transparent;color:#888;
         display:flex;align-items:center;gap:5px;white-space:nowrap;}
.bld-tab.active{color:#1a1a1a;border-bottom-color:var(--gold);}

/* ── STATS ───────────────────────────────────────────────────── */
.stats-row{display:flex;padding:10px 14px;background:var(--white);
           border-bottom:1px solid var(--border);flex-wrap:wrap;gap:0;overflow-x:auto;}
.stat{padding:0 16px 0 0;border-right:1px solid #eee;margin-right:16px;flex-shrink:0;}
.stat:last-child{border-right:none;}
.stat-n{font-size:22px;font-weight:700;line-height:1;}
.stat-l{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.c-k{color:#1a1a1a;}.c-lire{color:var(--amber);}.c-tot{color:var(--amber);}
.c-dit{color:var(--blue);}.c-arr{color:var(--green);}.c-dep{color:var(--orange);}
.c-pas{color:var(--green);}.c-pis{color:var(--red);}.c-ooo{color:var(--gray);}

/* ── DATE BAR ────────────────────────────────────────────────── */
.date-bar{background:var(--hdr);padding:8px 14px;display:flex;align-items:center;
          justify-content:space-between;flex-wrap:wrap;gap:6px;}
.date-txt{color:#f0ead0;font-size:12px;font-weight:600;}
.bar-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sync-lbl{font-size:10px;color:#9a9070;}
.btn-g{background:transparent;border:1px solid var(--gold);color:var(--gold);
       border-radius:6px;padding:5px 11px;font-size:11px;cursor:pointer;font-weight:600;}
.btn-g:hover{background:var(--gold);color:#1a1500;}
.btn-up{background:var(--gold);border:none;color:#1a1500;
        border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;font-weight:700;}
.btn-up:hover{background:var(--gold2);}

/* ── FLOOR SECTION ───────────────────────────────────────────── */
.floor-wrap{margin:8px 12px;border:1px solid var(--border);
            border-radius:8px;overflow:hidden;background:var(--white);}
.floor-hdr{display:flex;align-items:center;justify-content:space-between;
           padding:7px 10px;background:#f9f8f4;border-bottom:1px solid var(--border);}
.floor-lbl{font-size:10px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;}
.btn-prn{background:var(--hdr);color:#f0ead0;border:none;border-radius:5px;
         padding:4px 9px;font-size:10px;cursor:pointer;font-weight:600;}
.btn-prn:hover{background:#3a3820;}

/* ── TABLE ───────────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead tr{background:var(--tbl-hdr);}
thead th{color:#d0c8a0;padding:7px 6px;text-align:left;font-weight:600;
         font-size:10px;white-space:nowrap;}
tbody tr{border-bottom:1px solid #f0f0f0;transition:background .1s;}
tbody tr:hover{background:#fafaf8 !important;}
tbody tr.r-arr{background:var(--row-arr);}
tbody tr.r-dep{background:var(--row-dep);}
tbody tr.r-occ{background:var(--row-occ);}
td{padding:5px 6px;vertical-align:middle;}
.td-nr{font-weight:700;font-size:12px;width:46px;}
.td-ps{width:30px;text-align:center;color:#555;}
.td-dt{font-size:10px;color:#555;width:76px;}
.sel{border:1px solid #ddd;border-radius:5px;padding:3px 4px;font-size:10px;
     background:var(--white);color:#333;width:128px;cursor:pointer;}
.badge{display:inline-block;border-radius:20px;padding:3px 9px;font-size:10px;
       font-weight:700;color:#fff;cursor:pointer;user-select:none;transition:opacity .15s;}
.bg{background:var(--green);}.br{background:var(--red);}
.badge:hover{opacity:.82;}
.fcb{width:13px;height:13px;cursor:pointer;accent-color:var(--gold);}
.ni{border:1px solid #e8e8e8;border-radius:5px;padding:3px 6px;font-size:10px;
    width:100%;color:#555;background:transparent;}
.ni:focus{outline:none;border-color:var(--gold);}

/* ── BOTTOM BAR ──────────────────────────────────────────────── */
.bot-bar{display:flex;align-items:center;gap:8px;padding:10px 12px 16px;flex-wrap:wrap;}
.btn-dl{background:var(--green);color:#fff;border:none;border-radius:7px;
        padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-dl:hover{background:#16a34a;}

/* ── HK CARDS ────────────────────────────────────────────────── */
.hk-floor{padding:10px 12px 0;}
.hk-floor-lbl{font-size:9px;font-weight:700;color:#888;letter-spacing:1px;
               text-transform:uppercase;margin-bottom:7px;
               padding-bottom:5px;border-bottom:1px solid #e5e0d8;}
.card-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px;}
.room-card{border-radius:10px;padding:9px 5px;text-align:center;cursor:pointer;
           user-select:none;transition:transform .12s,filter .12s;}
.room-card:active{transform:scale(.93);}
.room-card.pas{background:var(--green);}
.room-card.pis{background:var(--red);}
.rc-n{font-size:16px;font-weight:700;color:#fff;line-height:1;}
.rc-l{font-size:9px;color:rgba(255,255,255,.85);margin-top:2px;}
.rc-t{font-size:9px;color:rgba(255,255,255,.65);margin-top:1px;}

/* ── OVERLAY ─────────────────────────────────────────────────── */
#overlay{position:fixed;inset:0;background:rgba(37,35,24,.82);
         display:none;align-items:center;justify-content:center;z-index:999;}
.spinner{width:36px;height:36px;border:3px solid #4a4530;
         border-top-color:var(--gold);border-radius:50%;
         animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media(max-width:460px){
  .card-grid{grid-template-columns:repeat(4,1fr);}
  .rc-n{font-size:14px;}
  .role-card{padding:22px 28px;}
}
@media print{
  .hdr,.bld-tabs,.stats-row,.date-bar,.bot-bar,.btn-prn{display:none!important;}
  .floor-wrap{border:none;margin:0;}
  table{font-size:10px;}
}
</style>
</head>
<body>

<input id="file-in" type="file" accept=".xls,.xlsx,.xml" style="display:none">
<div id="overlay"><div class="spinner"></div></div>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="s-login">
  <div class="brand">
    <span style="font-size:28px">🌸</span>
    <span class="brand-name">FLOWER HMS</span>
  </div>
  <div class="login-sub">Sistemi i Menaxhimit të Pastrimit</div>
  <div class="role-cards">
    <div class="role-card" onclick="showFOForm()">
      <div class="rc-icon">🏨</div>
      <div class="rc-title">Recepsion</div>
      <div class="rc-sub">Front Office Staff</div>
    </div>
    <div class="role-card" onclick="doLoginHK()">
      <div class="rc-icon">🧹</div>
      <div class="rc-title">Pastrimi</div>
      <div class="rc-sub">Stafi i Pastrimit</div>
    </div>
  </div>
  <div id="fo-form">
    <input id="fo-u" class="l-input" placeholder="Username" autocomplete="off">
    <input id="fo-p" class="l-input" type="password" placeholder="Fjalëkalimi"
           onkeydown="if(event.key==='Enter')doLoginFO()">
    <button class="l-btn" onclick="doLoginFO()">Hyr si Recepsionist</button>
    <div id="l-err"></div>
  </div>
</div>

<!-- ═══════════════ FRONT OFFICE ═══════════════ -->
<div id="s-fo" style="display:none">
  <div class="hdr">
    <div class="hdr-logo">
      <span class="dot" style="background:var(--red)"></span>
      🌸 FLOWER HMS
    </div>
    <div class="hdr-right">
      <span class="hdr-pill" id="fo-pill">🏨 Recepsion</span>
      <button class="hdr-out" onclick="doLogout()">Dil ↪</button>
    </div>
  </div>

  <div class="bld-tabs">
    <div class="bld-tab active" id="fo-tf" onclick="switchFO('flower')">
      <span class="dot" style="background:var(--red)"></span>Flower Hotel
    </div>
    <div class="bld-tab" id="fo-tg" onclick="switchFO('garden')">
      <span class="dot" style="background:var(--green)"></span>Garden Hotel
    </div>
  </div>

  <div class="stats-row" id="fo-stats"></div>

  <div class="date-bar">
    <div class="date-txt" id="fo-date"></div>
    <div class="bar-right">
      <span class="sync-lbl" id="sync-lbl"></span>
      <button class="btn-g" onclick="doReset()">↺ Reset Ditës</button>
      <button class="btn-up" onclick="document.getElementById('file-in').click()">
        📤 Ngarko Excel Trinosoft
      </button>
    </div>
  </div>

  <div id="fo-content"></div>

  <div class="bot-bar">
    <button class="btn-dl" onclick="dlExcel()">⬇ Shkarko Raport Excel</button>
    <button class="btn-g"  onclick="push(false)">☁ Ruaj në Server</button>
  </div>
</div>

<!-- ═══════════════ HOUSEKEEPING ═══════════════ -->
<div id="s-hk" style="display:none">
  <div class="hdr">
    <div class="hdr-logo" id="hk-logo">
      <span class="dot" style="background:var(--green)"></span>
      🌸 FLOWER HMS
    </div>
    <div class="hdr-right">
      <span class="hdr-pill" id="hk-pill">🌸 Pastrim · Flower</span>
      <button class="hdr-out" onclick="doLogout()">Dil ↪</button>
    </div>
  </div>

  <div class="bld-tabs">
    <div class="bld-tab active" id="hk-tf" onclick="switchHK('flower')">
      <span class="dot" style="background:var(--red)"></span>Flower Hotel
    </div>
    <div class="bld-tab" id="hk-tg" onclick="switchHK('garden')">
      <span class="dot" style="background:var(--green)"></span>Garden Hotel
    </div>
  </div>

  <div class="stats-row" id="hk-stats"></div>
  <div id="hk-content" style="padding-bottom:20px;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// INVENTORY — e modifikueshme lehtë këtu
// ══════════════════════════════════════════════════════════════
function r(a,b){return Array.from({length:b-a+1},(_,i)=>String(a+i));}
function g(a,b){return Array.from({length:b-a+1},(_,i)=>'G '+(a+i));}

const INV = {
  flower: {
    'Kati 1': r(101,114),
    'Kati 2': r(201,214),
    'Kati 3': r(301,315),
    'Kati 4': r(401,414),
    'Kati 5': r(501,510),
    'Vilat' : ['VILA 1','VILA 2']
  },
  garden: {
    'Kati 1': g(101,115),
    'Kati 2': g(201,215),
    'Kati 3': g(301,315),
    'Kati 4': g(401,415),
    'Kati 5': g(501,515),
    'Kati 6': g(601,616)
  }
};

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let role = null;
let bld  = 'flower';
let rooms = {};

function initRooms() {
  for (const [building, floors] of Object.entries(INV))
    for (const [fl, nums] of Object.entries(floors))
      for (const num of nums) {
        const k = `${building}-${num}`;
        if (!rooms[k]) rooms[k] = {
          num, bld: building, fl,
          status: 'liree',   // liree | ardhje | ikje | qendrim
          clean:  'piseet',  // piseet | paster
          persons: '', checkin: '', checkout: '',
          notes: '', flags: {vip:0,rom:0,dec:0,wp:0,bc:0}, ts: null
        };
      }
}

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
const DAYS = ['E Diel','E Hënë','E Martë','E Mërkurë','E Enjte','E Premte','E Shtunë'];
const MONS = ['Janar','Shkurt','Mars','Prill','Maj','Qershor',
              'Korrik','Gusht','Shtator','Tetor','Nëntor','Dhjetor'];
function dateAlb(d){ return `${DAYS[d.getDay()]}, ${d.getDate()} ${MONS[d.getMonth()]} ${d.getFullYear()}`; }
function nowHM(){ const d=new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }

function showEl(id){ document.getElementById(id).style.display='block'; }
function hideEl(id){ document.getElementById(id).style.display='none'; }
function screen(id){
  ['s-login','s-fo','s-hk'].forEach(s=>{ const e=document.getElementById(s); if(e) e.style.display='none'; });
  showEl(id);
}
function loading(v){ document.getElementById('overlay').style.display = v ? 'flex' : 'none'; }

function computeStats(b) {
  const rs = Object.values(rooms).filter(x => x.bld === b);
  return {
    total:  rs.length,
    liree:  rs.filter(x=>x.status==='liree').length,
    totale: rs.filter(x=>x.status==='ardhje'||x.status==='ikje').length,
    ditore: rs.filter(x=>x.status==='qendrim').length,
    ardhje: rs.filter(x=>x.status==='ardhje').length,
    ikje:   rs.filter(x=>x.status==='ikje').length,
    paster: rs.filter(x=>x.clean==='paster').length,
    piseet: rs.filter(x=>x.clean==='piseet').length
  };
}

// ══════════════════════════════════════════════════════════════
// LOGIN / LOGOUT
// ══════════════════════════════════════════════════════════════
function showFOForm() {
  document.getElementById('fo-form').style.display = 'flex';
  document.getElementById('fo-u').focus();
}
function doLoginFO() {
  const u = (document.getElementById('fo-u').value||'').trim();
  const p = (document.getElementById('fo-p').value||'').trim();
  if (u.toLowerCase() === 'front office' && p === 'FO2026') {
    role = 'fo'; bld = 'flower';
    screen('s-fo'); renderFO();
  } else {
    document.getElementById('l-err').textContent = 'Username ose fjalëkalim i gabuar.';
  }
}
function doLoginHK() {
  role = 'hk'; bld = 'flower';
  screen('s-hk'); renderHK();
}
function doLogout() {
  role = null; bld = 'flower';
  screen('s-login');
  document.getElementById('fo-form').style.display = 'none';
  document.getElementById('fo-u').value = '';
  document.getElementById('fo-p').value = '';
  document.getElementById('l-err').textContent = '';
}

// ══════════════════════════════════════════════════════════════
// SWITCH BUILDING
// ══════════════════════════════════════════════════════════════
function switchFO(b) {
  bld = b;
  document.getElementById('fo-tf').className = 'bld-tab' + (b==='flower'?' active':'');
  document.getElementById('fo-tg').className = 'bld-tab' + (b==='garden'?' active':'');
  renderFO();
}
function switchHK(b) {
  bld = b;
  document.getElementById('hk-tf').className = 'bld-tab' + (b==='flower'?' active':'');
  document.getElementById('hk-tg').className = 'bld-tab' + (b==='garden'?' active':'');
  document.getElementById('hk-pill').textContent = '🌸 Pastrim · ' + (b==='flower'?'Flower':'Garden');
  renderHK();
}

// ══════════════════════════════════════════════════════════════
// RENDER — FRONT OFFICE
// ══════════════════════════════════════════════════════════════
function renderFO() {
  const s = computeStats(bld);
  document.getElementById('fo-stats').innerHTML = `
    <div class="stat"><div class="stat-n c-k">${s.total}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n c-lire">${s.liree}</div><div class="stat-l">E Lirë</div></div>
    <div class="stat"><div class="stat-n c-tot">${s.totale}</div><div class="stat-l">Totale</div></div>
    <div class="stat"><div class="stat-n c-dit">${s.ditore}</div><div class="stat-l">Ditore</div></div>
    <div class="stat"><div class="stat-n c-arr">${s.ardhje}</div><div class="stat-l">Ardhje</div></div>
    <div class="stat"><div class="stat-n c-dep">${s.ikje}</div><div class="stat-l">Ikje</div></div>`;
  document.getElementById('fo-date').textContent = '📅 ' + dateAlb(new Date());

  const floors = INV[bld];
  let html = '';
  for (const [fl, nums] of Object.entries(floors)) {
    html += `
    <div class="floor-wrap">
      <div class="floor-hdr">
        <span class="floor-lbl">${fl}</span>
        <button class="btn-prn" onclick="printFloor('${fl}')">🖨 Printo ${fl}</button>
      </div>
      <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Nr.</th><th>Pers.</th><th>Check In</th><th>Check Out</th>
          <th>Status</th><th>Pastrimi</th>
          <th title="VIP">VIP</th><th title="Romantic">ROM</th>
          <th title="Decoration">DEC</th><th title="Wakeup">WP</th>
          <th title="Baby Crib">BC</th>
          <th style="min-width:100px">Shënime</th>
        </tr></thead><tbody>`;
    for (const num of nums) {
      const k = `${bld}-${num}`, room = rooms[k]; if (!room) continue;
      const rc = {ardhje:'r-arr',ikje:'r-dep',qendrim:'r-occ'}[room.status] || '';
      const bc = room.clean==='paster' ? 'bg' : 'br';
      const bt = room.clean==='paster' ? 'E Pastër' : 'E Pisët';
      const ck = room.checkin  ? `<span style="color:#3b82f6;font-weight:600">${room.checkin}</span>`  : '<span style="color:#ccc">–</span>';
      const co = room.checkout ? `<span style="color:#ef4444;font-weight:600">${room.checkout}</span>` : '<span style="color:#ccc">–</span>';
      html += `<tr class="${rc}">
        <td class="td-nr">${num}</td>
        <td class="td-ps">${room.persons||'–'}</td>
        <td class="td-dt">${ck}</td>
        <td class="td-dt">${co}</td>
        <td><select class="sel" onchange="setStatus('${k}',this.value)">
          <option value="liree"  ${room.status==='liree'   ?'selected':''}>E lirë</option>
          <option value="ardhje" ${room.status==='ardhje'  ?'selected':''}>Ardhje / Totale</option>
          <option value="ikje"   ${room.status==='ikje'    ?'selected':''}>Ikje / Totale</option>
          <option value="qendrim"${room.status==='qendrim' ?'selected':''}>Qëndrim / Ditor</option>
        </select></td>
        <td><span class="badge ${bc}" onclick="toggleClean('${k}',false)">${bt}</span></td>
        ${['vip','rom','dec','wp','bc'].map(f=>`
        <td style="text-align:center">
          <input type="checkbox" class="fcb" ${room.flags[f]?'checked':''}
                 onchange="setFlag('${k}','${f}',this.checked)">
        </td>`).join('')}
        <td><input class="ni" value="${(room.notes||'').replace(/"/g,'&quot;')}"
                   placeholder="Shënim…" onchange="setNotes('${k}',this.value)"></td>
      </tr>`;
    }
    html += '</tbody></table></div></div>';
  }
  document.getElementById('fo-content').innerHTML = html;
}

// ══════════════════════════════════════════════════════════════
// RENDER — HOUSEKEEPING CARDS
// ══════════════════════════════════════════════════════════════
function renderHK() {
  const s = computeStats(bld);
  document.getElementById('hk-stats').innerHTML = `
    <div class="stat"><div class="stat-n c-k">${s.total}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n c-pas">${s.paster}</div><div class="stat-l">E Pastër</div></div>
    <div class="stat"><div class="stat-n c-pis">${s.piseet}</div><div class="stat-l">E Pisët</div></div>
    <div class="stat"><div class="stat-n c-ooo">0</div><div class="stat-l">Out of Order</div></div>`;

  const floors = INV[bld];
  let html = '';
  for (const [fl, nums] of Object.entries(floors)) {
    html += `<div class="hk-floor"><div class="hk-floor-lbl">${fl}</div><div class="card-grid">`;
    for (const num of nums) {
      const k = `${bld}-${num}`, room = rooms[k]; if (!room) continue;
      const cls = room.clean === 'paster' ? 'pas' : 'pis';
      const lbl = room.clean === 'paster' ? 'E Pastër' : 'E Pisët';
      html += `<div class="room-card ${cls}" onclick="toggleClean('${k}',true)">
        <div class="rc-n">${num}</div>
        <div class="rc-l">${lbl}</div>
        <div class="rc-t">${room.ts||'––:––'}</div>
      </div>`;
    }
    html += '</div></div>';
  }
  document.getElementById('hk-content').innerHTML = html;
}

// ══════════════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════════════
function setStatus(k, v) { rooms[k].status = v; renderFO(); }
function setFlag(k, f, v) { rooms[k].flags[f] = v ? 1 : 0; }
function setNotes(k, v)   { rooms[k].notes = v; }

function toggleClean(k, fromHK = false) {
  const room = rooms[k];
  room.clean = room.clean === 'paster' ? 'piseet' : 'paster';
  room.ts = nowHM();
  if (fromHK) { renderHK(); push(true); }   // auto-save silent
  else         { renderFO(); }
}

function doReset() {
  if (!confirm('Resetohet statusi i pastrimit për të gjitha dhomat. Konfirmoni?')) return;
  Object.values(rooms).forEach(room => { room.clean = 'piseet'; room.ts = null; });
  renderFO();
}

// ══════════════════════════════════════════════════════════════
// SERVER SYNC
// ══════════════════════════════════════════════════════════════
async function push(silent = false) {
  const lbl = document.getElementById('sync-lbl');
  if (!silent && lbl) lbl.textContent = '⏳ Duke ruajtur…';
  try {
    const res = await fetch('/api/hms/state', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ state: rooms })
    });
    const ct = res.headers.get('content-type') || '';
    if (!ct.includes('json')) throw new Error('non-json');
    const data = await res.json();
    if (!silent && lbl) {
      lbl.textContent = data.ok ? '✅ U ruajt' : '⚠ Gabim';
      setTimeout(() => { if (lbl) lbl.textContent = ''; }, 2500);
    }
  } catch (e) {
    if (!silent && lbl) lbl.textContent = '⚠ Server jo i arritshëm';
    console.warn('[HMS] push failed:', e.message);
  }
}

async function pull() {
  loading(true);
  try {
    const res = await fetch('/api/hms/state');
    const ct  = res.headers.get('content-type') || '';
    if (!ct.includes('json')) throw new Error('non-json response');
    const data = await res.json();
    if (data && data.data && Object.keys(data.data).length > 0) {
      for (const [k, v] of Object.entries(data.data))
        if (rooms[k]) Object.assign(rooms[k], v);
    }
  } catch (e) {
    console.warn('[HMS] pull failed:', e.message);
  } finally {
    loading(false);
  }
}

// ══════════════════════════════════════════════════════════════
// XML PARSE — Trinosoft SpreadsheetML
// ══════════════════════════════════════════════════════════════
function parseTrinosoft(xmlText) {
  const clean = xmlText.replace(/^\uFEFF/, '').replace(/<\?mso-application[^?]*\?>/g, '');
  const doc   = new DOMParser().parseFromString(clean, 'text/xml');
  const SS    = 'urn:schemas-microsoft-com:office:spreadsheet';
  const rows  = Array.from(doc.getElementsByTagNameNS(SS, 'Row'));
  const out   = [];
  for (let i = 1; i < rows.length; i++) {
    const cells = Array.from(rows[i].getElementsByTagNameNS(SS, 'Cell'));
    const v = cells.map(c => {
      const d = c.getElementsByTagNameNS(SS, 'Data')[0];
      return d ? (d.textContent || '').trim() : '';
    });
    const cat    = v[1] || '';
    const rawNum = v[2] || '';
    if (!['Ardhjet','Largimet','Qëndrimet'].includes(cat) || !rawNum) continue;
    const num    = rawNum.replace(/\s+(TR|SD|FR|SU|FM|DX|SB|Sdb|SUITE)$/i, '').trim();
    const status = { Ardhjet:'ardhje', Largimet:'ikje', Qëndrimet:'qendrim' }[cat];
    const fd = iso => {
      if (!iso) return '';
      const [y,m,d] = iso.split('T')[0].split('-');
      return `${d}/${m}/${y}`;
    };
    out.push({ num, status, persons: v[5]||'', checkin: fd(v[6]), checkout: fd(v[7]), notes: v[8]||'' });
  }
  return out;
}

function applyUpload(parsed) {
  // Reset occupancy data
  Object.values(rooms).forEach(room => {
    room.status = 'liree'; room.persons = ''; room.checkin = ''; room.checkout = '';
  });
  // Apply parsed rows
  parsed.forEach(d => {
    for (const building of ['flower','garden']) {
      const k = `${building}-${d.num}`;
      if (rooms[k]) {
        Object.assign(rooms[k], {
          status:   d.status,
          persons:  d.persons,
          checkin:  d.checkin,
          checkout: d.checkout,
          notes:    d.notes || rooms[k].notes
        });
        break;
      }
    }
  });
  renderFO();
  setTimeout(() => push(true), 400); // auto-save after upload
}

document.getElementById('file-in').onchange = function (e) {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => applyUpload(parseTrinosoft(ev.target.result));
  reader.readAsText(f, 'utf-8');
  this.value = '';
};

      <td style="font-weight:700">${num}</td><td>${room.persons||'–'}</td>

        ${room.clean==='paster'?'E Pastër':'E Pisët'}

      <td>${room.flags.vip?'✓':''}</td><td>${room.flags.rom?'✓':''}</td>
      <td>${room.flags.dec?'✓':''}</td><td>${room.flags.wp?'✓':''}</td>

  <style>
    body{font-family:Arial,sans-serif;font-size:11px;padding:18px;color:#111}

  <h2>🌸 FLOWER HMS — Raport i Pastrimit</h2>
  <h3>${bld==='flower'?'Flower Hotel':'Garden Hotel'} · ${fl} · ${dateAlb(new Date())}</h3>
  <table>
    <thead><tr>
      <th>Nr.</th><th>Pers.</th><th>Check In</th><th>Check Out</th>
      <th>Status</th><th>Pastrimi</th>
      <th>VIP</th><th>ROM</th><th>DEC</th><th>WP</th><th>BC</th><th>Shënime</th>
    </tr></thead>

// ══════════════════════════════════════════════════════════════
// EXCEL DOWNLOAD
// ══════════════════════════════════════════════════════════════
function dlExcel() {
  if (typeof XLSX === 'undefined') { alert('Libraria XLSX nuk u ngarkua.'); return; }
  const wb  = XLSX.utils.book_new();
  const hdr = ['Nr.','Pers.','Check In','Check Out','Status','Pastrimi',
               'VIP','ROM','DEC','WP','BC','Shënime'];
  const aoa = [hdr];
  for (const [fl, nums] of Object.entries(INV[bld])) {
    aoa.push([fl,'','','','','','','','','','','']);
    for (const num of nums) {
      const k = `${bld}-${num}`, room = rooms[k]; if (!room) continue;
      const sl = {liree:'E lirë',ardhje:'Ardhje/Totale',ikje:'Ikje/Totale',qendrim:'Qëndrim/Ditor'}[room.status]||'E lirë';
      aoa.push([num, room.persons||'', room.checkin||'', room.checkout||'',
        sl, room.clean==='paster'?'E Pastër':'E Pisët',
        room.flags.vip?'Po':'', room.flags.rom?'Po':'', room.flags.dec?'Po':'',
        room.flags.wp?'Po':'',  room.flags.bc?'Po':'',  room.notes||'']);
    }
  }
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{wch:10},{wch:6},{wch:12},{wch:12},{wch:18},{wch:12},
                 {wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:22}];
  XLSX.utils.book_append_sheet(wb, ws, bld==='flower'?'Flower Hotel':'Garden Hotel');
  const t = new Date();
  const dn = `Raport_Pastrimi_${String(t.getDate()).padStart(2,'0')}-${String(t.getMonth()+1).padStart(2,'0')}-${t.getFullYear()}.xlsx`;
  XLSX.writeFile(wb, dn);
}
